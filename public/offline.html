<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NutriU | Sin conexion</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #f8fff9 0%, #e9f8ed 100%);
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        color: #1e293b;
        padding: 24px;
      }

      .card {
        width: min(560px, 100%);
        background: #ffffff;
        border: 1px solid #d1e7d9;
        border-radius: 18px;
        box-shadow: 0 10px 35px rgba(46, 139, 87, 0.14);
        padding: 28px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(1.4rem, 3vw, 1.8rem);
        color: #2e8b57;
      }

      p {
        margin: 0 0 12px;
        line-height: 1.45;
      }

      ul {
        margin: 12px 0 0;
        padding-left: 20px;
      }

      li {
        margin: 6px 0;
      }

      .actions {
        margin-top: 18px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      button,
      a {
        border: 0;
        border-radius: 10px;
        padding: 10px 14px;
        font-weight: 600;
        text-decoration: none;
        cursor: pointer;
      }

      button {
        background: #2e8b57;
        color: #fff;
      }

      a {
        background: #e8f5ec;
        color: #14532d;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Estas sin conexion</h1>
      <p>No pudimos abrir esta vista porque en este momento no hay internet.</p>
      <p>Puedes intentar lo siguiente:</p>
      <ul>
        <li>Verifica tu red Wi-Fi o datos moviles.</li>
        <li>Recarga la pagina en unos segundos.</li>
        <li>Regresa al inicio para usar contenido ya cacheado.</li>
      </ul>
      <div class="actions">
        <button type="button" onclick="location.reload()">Reintentar</button>
        <a href="/">Ir al inicio</a>
      </div>
    </main>
  </body>
</html>
